{% extends "base.html" %}
{% block title %}Career Roadmap — Naukri AI{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-map"></i> Career Roadmap Builder</h4>
<div class="row g-3">
  <div class="col-lg-4">
    <div class="card p-3">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Current Role / Level</label>
          <input type="text" name="current_role" class="form-control" value="{{ user.current_role or '' }}" placeholder="e.g. Junior Developer, Fresher">
        </div>
        <div class="mb-3">
          <label class="form-label">Target Role</label>
          <input type="text" name="target_role" class="form-control" value="{{ user.target_role or '' }}" required placeholder="e.g. Senior Data Scientist">
        </div>
        <div class="mb-3">
          <label class="form-label">Years of Experience</label>
          <input type="number" name="experience_years" class="form-control" value="{{ user.experience_years or 0 }}" min="0">
        </div>
        <div class="mb-3">
          <label class="form-label">Education</label>
          <input type="text" name="education" class="form-control" value="{{ user.education or '' }}" placeholder="e.g. B.Tech CS, MBA">
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-cpu"></i> Build Roadmap</button>
      </form>
    </div>
  </div>
  <div class="col-lg-8">
    {% if result %}
    <div class="card p-3">
      <h6 class="fw-bold mb-2"><i class="bi bi-robot"></i> Your Personalised Roadmap</h6>
      <pre class="ai-result">{{ result }}</pre>
    </div>
    {% else %}
    <div class="card p-4 text-center text-muted">
      <i class="bi bi-map fs-1"></i>
      <p class="mt-2">Fill in your details to generate a step-by-step career roadmap.</p>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
