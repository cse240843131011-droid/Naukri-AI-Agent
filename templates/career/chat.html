{% extends "base.html" %}
{% block title %}AI Career Chat — Naukri AI{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-chat-dots"></i> AI Career Chat</h4>
<div class="row g-3 justify-content-center">
  <div class="col-lg-8">
    <div class="card p-3">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Ask Naukri AI anything about your career</label>
          <textarea name="message" class="form-control" rows="4" required
            placeholder="e.g. How do I transition from software engineer to product manager? What skills should I learn for AI/ML roles?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Ask AI</button>
      </form>
    </div>

    {% if result %}
    <div class="card p-3 mt-3">
      <h6 class="fw-bold mb-2"><i class="bi bi-robot"></i> Naukri AI Response</h6>
      <pre class="ai-result">{{ result }}</pre>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
