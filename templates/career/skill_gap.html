{% extends "base.html" %}
{% block title %}Skill Gap Analysis — Naukri AI{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-bar-chart-steps"></i> Skill Gap Analysis</h4>
<div class="row g-3">
  <div class="col-lg-4">
    <div class="card p-3">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Your Current Skills <small class="text-muted">(comma-separated)</small></label>
          <input type="text" name="user_skills" class="form-control" value="{{ user.skills or '' }}" placeholder="Python, SQL, Excel...">
        </div>
        <div class="mb-3">
          <label class="form-label">Target Role</label>
          <input type="text" name="target_role" class="form-control" value="{{ user.target_role or '' }}" required placeholder="e.g. Machine Learning Engineer">
        </div>
        <div class="mb-3">
          <label class="form-label">Job Description <small class="text-muted">(optional)</small></label>
          <textarea name="job_description" class="form-control" rows="5" placeholder="Paste JD for precise gap analysis..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-cpu"></i> Analyse Gaps</button>
      </form>
    </div>
  </div>
  <div class="col-lg-8">
    {% if result %}
    <div class="card p-3">
      <pre class="ai-result">{{ result }}</pre>
    </div>
    {% else %}
    <div class="card p-4 text-center text-muted">
      <i class="bi bi-bar-chart-steps fs-1"></i>
      <p class="mt-2">Enter your skills and target role to see what you need to learn.</p>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
