{% extends "base.html" %}
{% block title %}Recruiter Assistant — Naukri AI{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-people"></i> Recruiter Assistant</h4>
<div class="row g-3">
  <div class="col-md-4">
    <div class="card p-3 h-100">
      <h6 class="fw-bold"><i class="bi bi-trophy"></i> Candidate Ranking</h6>

      <a href="{{ url_for('recruiter.rank') }}" class="btn btn-primary mt-auto">Rank Candidates</a>
    </div>
  </div>
</div>
{% endblock %}
