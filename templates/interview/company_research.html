{% extends "base.html" %}
{% block title %}Company Research — Naukri AI{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-building"></i> Company Research</h4>
<div class="row g-3">
  <div class="col-lg-4">
    <div class="card p-3">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Company Name</label>
          <input type="text" name="company" class="form-control" required placeholder="e.g. Google, Infosys, Zomato">
        </div>
        <div class="mb-3">
          <label class="form-label">Target Role <span class="text-muted">(optional)</span></label>
          <input type="text" name="role" class="form-control" placeholder="e.g. Data Scientist">
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search"></i> Research</button>
      </form>
    </div>
  </div>
  <div class="col-lg-8">
    {% if result %}
    <div class="card p-3">
      <pre class="ai-result">{{ result }}</pre>
    </div>
    {% else %}
    <div class="card p-4 text-center text-muted">
      <i class="bi bi-building fs-1"></i>
      <p class="mt-2">Enter a company name to get deep AI-powered insights.</p>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
