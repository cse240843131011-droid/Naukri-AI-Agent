{% extends "base.html" %}
{% block title %}Upload Resume — Naukri AI{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-upload"></i> Upload Resume</h4>
<div class="card p-4 col-md-7">
  <form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label fw-semibold">Select Resume File</label>
      <input type="file" name="resume" class="form-control" accept=".pdf,.docx,.doc,.txt" required>
      <div class="form-text">Supported: PDF, DOCX, TXT — Max 16 MB</div>
    </div>
    <button type="submit" class="btn btn-primary"><i class="bi bi-cloud-upload"></i> Upload & Extract</button>
    <a href="{{ url_for('resume.index') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
