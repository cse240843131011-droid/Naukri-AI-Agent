{% extends "base.html" %}
{% block title %}My Profile — Naukri AI{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-person-badge"></i> My Profile</h4>
<div class="card p-4">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" value="{{ user.name }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Location</label>
        <input type="text" name="location" class="form-control" value="{{ user.location or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Current Role</label>
        <input type="text" name="current_role" class="form-control" value="{{ user.current_role or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Target Role</label>
        <input type="text" name="target_role" class="form-control" value="{{ user.target_role or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Years of Experience</label>
        <input type="number" step="0.5" name="experience_years" class="form-control" value="{{ user.experience_years or 0 }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Education</label>
        <input type="text" name="education" class="form-control" value="{{ user.education or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Expected Salary (LPA)</label>
        <input type="text" name="expected_salary" class="form-control" value="{{ user.expected_salary or '' }}">
      </div>
      <div class="col-12">
        <label class="form-label">Skills <small class="text-muted">(comma-separated)</small></label>
        <input type="text" name="skills" class="form-control" value="{{ user.skills or '' }}" placeholder="Python, SQL, Machine Learning...">
      </div>
      <div class="col-md-6">
        <label class="form-label">LinkedIn URL</label>
        <input type="url" name="linkedin_url" class="form-control" value="{{ user.linkedin_url or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">GitHub URL</label>
        <input type="url" name="github_url" class="form-control" value="{{ user.github_url or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Work Mode</label>
        <select name="work_mode" class="form-select">
          {% for mode in ['any','remote','hybrid','onsite'] %}
          <option value="{{ mode }}" {% if user.work_mode == mode %}selected{% endif %}>{{ mode.title() }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 mt-2">
        <button type="submit" class="btn btn-primary">Save Profile</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
