{% extends "base.html" %}
{% block title %}Login — Naukri AI{% endblock %}
{% block public_content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-3">
        <i class="bi bi-robot fs-1 text-primary"></i>
        <h4 class="fw-bold mt-1">Naukri <span class="text-primary">AI</span></h4>
        <p class="text-muted small">IBM-Powered Career Assistant</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <hr>
      <p class="text-center mb-0 small">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
    </div>
  </div>
</div>
{% endblock %}
