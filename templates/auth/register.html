{% extends "base.html" %}
{% block title %}Register — Naukri AI{% endblock %}
{% block public_content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-3">
        <i class="bi bi-robot fs-1 text-primary"></i>
        <h4 class="fw-bold mt-1">Create Account</h4>
        <p class="text-muted small">Start your AI-powered career journey</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <div class="mb-3">
          <label class="form-label">I am a…</label>
          <select name="role" class="form-select">
            <option value="student">Student / Fresher</option>
            <option value="fresher">Recent Graduate</option>
            <option value="experienced">Experienced Professional</option>
            <option value="recruiter">Recruiter / HR</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Account</button>
      </form>
      <hr>
      <p class="text-center mb-0 small">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
    </div>
  </div>
</div>
{% endblock %}
